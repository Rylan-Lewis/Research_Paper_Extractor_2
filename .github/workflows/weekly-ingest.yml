name: Regular paper ingestion (Every Monday at 10 AM)

on:
  schedule:
    # every 3 hours at minute 0
    - cron: '0 17 * * 1'
  workflow_dispatch:  # allow manual runs

concurrency:
  group: ingest-sheet-only
  cancel-in-progress: true   # prevents overlapping runs — cancels previous run if a new one starts

permissions:
  contents: read
  # No need to grant write contents since we won't commit; keep minimal perms.

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 360   # 6 hours (max allowed for hosted runners)
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run incremental ingestion (sheet-only)
        env:
          SHEET_ID: ${{ secrets.SHEET_ID }}
          GCP_SA_JSON: ${{ secrets.GCP_SA_JSON }}
        run: |
          python ingest.py
